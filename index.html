// ─── PERSISTENCIA EN SUPABASE ───────────────────────────────────────────────
// Todo lo que Fernando registra (turno/fecha de inicio, peso, cintura, dolor,
// racha, fotos) vive en su cuenta de Supabase — sincronizado entre dispositivos.
const useProfileSettings = () => {
  const [settings, setSettings] = useState(null);

  useEffect(() => {
    const load = async () => {
      const { data } = await sb.from("profile_settings").select("*").maybeSingle();
      if (data) { setSettings(data); return; }
      const defaults = { turno_entreno: "manana", plan_start_date: todayISO() };
      const { data: created } = await sb.from("profile_settings").insert(defaults).select().single();
      setSettings(created);
    };
    load();
  }, []);

  const updateSettings = async (patch) => {
    const { data } = await sb.from("profile_settings").update(patch).eq("user_id", settings.user_id).select().single();
    setSettings(data);
  };

  return { settings, updateSettings };
};

const useBodyMetrics = () => {
  const [rows, setRows] = useState([]);
  const [loading, setLoading] = useState(true);

  const refresh = async () => {
    const { data } = await sb.from("body_metrics").select("*").order("metric_date", { ascending: true });
    setRows(data || []);
    setLoading(false);
  };

  useEffect(() => { refresh(); }, []);

  const upsertToday = async (patch) => {
    await sb.from("body_metrics").upsert({ metric_date: todayISO(), ...patch }, { onConflict: "user_id,metric_date" });
    await refresh();
  };

  return { rows, loading, upsertToday };
};

const useTrainedDays = () => {
  const [dates, setDates] = useState([]);

  useEffect(() => {
    const load = async () => {
      const { data } = await sb.from("trained_days").select("training_date");
      setDates((data || []).map((r) => r.training_date));
    };
    load();
  }, []);

  const markToday = async () => {
    if (dates.includes(todayISO())) return;
    await sb.from("trained_days").insert({ training_date: todayISO() });
    setDates((prev) => [...prev, todayISO()]);
  };

  return { dates, markToday };
};

const compressImage = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, 400 / img.width);
      const canvas = document.createElement("canvas");
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      canvas.toBlob((blob) => blob ? resolve(blob) : reject(new Error("No se pudo comprimir la imagen")), "image/jpeg", 0.6);
    };
    img.onerror = reject;
    img.src = e.target.result;
  };
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

const PHOTOS_LIMIT = 12;

// ─── Fotos en Supabase Storage (bucket privado + enlaces temporales) ────────
const usePhotos = () => {
  const [photos, setPhotos] = useState([]);
  const [loading, setLoading] = useState(true);

  const refresh = async () => {
    const { data: rows } = await sb.from("photos").select("*").order("photo_date", { ascending: false }).limit(PHOTOS_LIMIT);
    const withUrls = await Promise.all((rows || []).map(async (row) => {
      const { data } = await sb.storage.from("progress-photos").createSignedUrl(row.storage_path, 3600);
      return { id: row.id, date: row.photo_date, path: row.storage_path, url: data?.signedUrl };
    }));
    setPhotos(withUrls);
    setLoading(false);
  };

  useEffect(() => { refresh(); }, []);

  const uploadPhoto = async (file) => {
    const { data: { user } } = await sb.auth.getUser();
    const blob = await compressImage(file);
    const path = `${user.id}/${Date.now()}.jpg`;
    await sb.storage.from("progress-photos").upload(path, blob, { contentType: "image/jpeg" });
    await sb.from("photos").insert({ photo_date: todayISO(), storage_path: path });
    await refresh();
  };

  const deletePhoto = async (photo) => {
    await sb.storage.from("progress-photos").remove([photo.path]);
    await sb.from("photos").delete().eq("id", photo.id);
    await refresh();
  };

  return { photos, loading, uploadPhoto, deletePhoto };
};

const MiniChart = ({ data, col }) => {
  if (data.length < 2) return <div style={{fontSize:"var(--fs-10)",color:"#4b5563",padding:"14px",textAlign:"center"}}>Añade al menos 2 registros para ver la gráfica</div>;
  const values = data.map(d => d.value);
  const min = Math.min(...values), max = Math.max(...values), range = (max - min) || 1;
  const w = 100, h = 36, pad = 4;
  const coords = data.map((d,i) => ({
    x: pad + (i/(data.length-1)) * (w-2*pad),
    y: pad + (1 - (d.value-min)/range) * (h-2*pad),
  }));
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:"70px",display:"block"}} preserveAspectRatio="none">
      <polyline points={coords.map(c=>`${c.x},${c.y}`).join(" ")} fill="none" stroke={col} strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>
      {coords.map((c,i)=><circle key={i} cx={c.x} cy={c.y} r="1.6" fill={col}/>)}
    </svg>
  );
}

const painRecommendation = (entry, copy) => {
  if (!entry) return null;
  if (entry.post >= 7) return { color:"#ef4444", text: copy.painHighText };
  if (entry.post - entry.pre >= 3) return { color:"#f59e0b", text: copy.painWorsenedText };
  if (entry.post >= 4) return { color:"#f59e0b", text: copy.painModerateText };
  return { color:"#4ade80", text:"Buena señal. Puedes mantener o progresar ligeramente la próxima sesión." };
};

const computeStreak = (trainedDays) => {
  const set = new Set(trainedDays);
  const lastYear = Array.from({ length: 365 }, (_, i) => {
    const d = new Date();
    d.setDate(d.getDate() - i);
    return d.toISOString().slice(0,10);
  });
  const firstGap = lastYear.findIndex((date) => !set.has(date));
  return firstGap === -1 ? lastYear.length : firstGap;
};

const InicioTab = ({ col, phase, setTab }) => {
  const bundle = useProfileBundle();
  const { profile: PROFILE, milestones, tests2, totalWeeks, hasSupplements, scheduleAM, scheduleTarde } = bundle;
  const { settings } = useProfileSettings();
  const { rows: metricsRows } = useBodyMetrics();
  const { dates: trainedDays, markToday: markTrainedToday } = useTrainedDays();

  const planStart = settings?.plan_start_date || todayISO();
  const turno = settings?.turno_entreno || "manana";

  const elapsedDays = Math.max(0, daysBetween(planStart, todayISO()));
  const weekNumber = totalWeeks ? Math.min(totalWeeks, Math.floor(elapsedDays/7) + 1) : Math.floor(elapsedDays/7) + 1;
  const pctCompleted = totalWeeks ? Math.min(100, Math.round((weekNumber/totalWeeks)*100)) : null;

  const weightRows = metricsRows.filter(r => r.weight_kg != null);
  const currentWeight = weightRows.length ? Number(weightRows[weightRows.length-1].weight_kg) : PROFILE.pesoInicialKg;
  const imc = calcIMC(currentWeight, PROFILE.alturaCm);
  const nextMilestone = milestones.find(m => currentWeight > m.kg) || milestones[milestones.length-1];

  const nextTest = tests2.find(t => parseInt(t.semana.replace(/\D/g,""),10) >= weekNumber) || tests2[tests2.length-1];

  const schedule = turno === "manana" ? scheduleAM : scheduleTarde;
  const nowHM = new Date().toTimeString().slice(0,5);
  const nextSupp = hasSupplements ? (schedule.filter(s=>s.tipo==="suplemento").find(s => s.hora > nowHM) || schedule.filter(s=>s.tipo==="suplemento")[0]) : null;

  const isTrainedToday = trainedDays.includes(todayISO());
  const streak = computeStreak(trainedDays);

  const tiles = bundle.buildDashboardTiles({ currentWeight, imc, imcCategoria: imcCategoria(imc), phase, streak, isTrainedToday, nextTest, nextSupp, pctCompleted, weekNumber, totalWeeks, nextMilestone });

  return (
    <div style={{padding:"14px"}}>
      <div style={{fontSize:"var(--fs-9)",letterSpacing:"3px",color:"#4b5563",textTransform:"uppercase",marginBottom:"10px"}}>HOLA {PROFILE.nombre.toUpperCase()} — SEMANA {weekNumber}{totalWeeks ? ` DE ${totalWeeks}` : ""}</div>

        {tiles.map((t,i)=><StatTile key={i} label={t.label} value={t.value} sub={t.sub} col={col}/>)}
      </div>
      <button onClick={markTrainedToday} disabled={isTrainedToday} style={{width:"100%",padding:"12px",marginTop:"6px",background:isTrainedToday?"#0a1a0a":`${col}20`,border:`1px solid ${isTrainedToday?"#14532450":col+"60"}`,color:isTrainedToday?"#4ade80":col,borderRadius:"6px",cursor:isTrainedToday?"default":"pointer",fontFamily:"inherit",fontWeight:"700",fontSize:"var(--fs-12)"}}>
        {isTrainedToday ? "✅ Hoy ya está registrado" : "✓ Marcar hoy como entrenado"}
      </button>
      <div style={{marginTop:"14px",padding:"10px 12px",background:"#080e1a",border:"1px solid #1d3a6a35",borderRadius:"4px",fontSize:"var(--fs-10)",color:"#93c5fd",lineHeight:"1.6"}}>
        💡 La semana se calcula desde que empezaste el plan ({planStart}). Es orientativo: usa las pestañas Plan y Objetivos para el detalle real.
      </div>
      <div style={{display:"flex",gap:"6px",marginTop:"10px"}}>
        <button onClick={()=>setTab("plan")} style={{flex:1,padding:"9px",background:"#111",border:"1px solid #1f1f1f",color:"#9ca3af",borderRadius:"4px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",fontSize:"var(--fs-10)"}}>📋 Ir al Plan</button>
        <button onClick={()=>setTab("horario")} style={{flex:1,padding:"9px",background:"#111",border:"1px solid #1f1f1f",color:"#9ca3af",borderRadius:"4px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",fontSize:"var(--fs-10)"}}>🗓️ Ir al Horario</button>
        <button onClick={()=>setTab("objetivos")} style={{flex:1,padding:"9px",background:"#111",border:"1px solid #1f1f1f",color:"#9ca3af",borderRadius:"4px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",fontSize:"var(--fs-10)"}}>🎯 Ir a Objetivos</button>
      </div>
    </div>
  );
}

// ─── AUTENTICACIÓN ────────────────────────────────────────────────────────────
const authInputStyle = {
  width:"100%", padding:"11px 12px", marginBottom:"10px", background:"#0a0a0a",
  border:"1px solid #262626", borderRadius:"5px", color:"#e5e7eb",
  fontFamily:"inherit", fontSize:"14px",
};

const SplashLoading = () => {
  return (
    <div style={{minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#090909"}}>
      <div style={{width:"22px", height:"22px", border:"2px solid #00d4aa", borderTopColor:"transparent", borderRadius:"50%", animation:"spin 0.8s linear infinite"}}/>
    </div>
  );
}

const LoginScreen = () => {
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [error, setError] = useState(null);
  const [loading, setLoading] = useState(false);

  const errorMessages = {
    "Invalid login credentials": "Email o contraseña incorrectos.",
  };

  const handleSubmit = async (e) => {
    e.preventDefault();
    setError(null);
    setLoading(true);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (error) setError(errorMessages[error.message] || error.message);
  };

  return (
    <div style={{minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#090909", padding:"20px"}}>
      <form onSubmit={handleSubmit} style={{width:"100%", maxWidth:"340px", background:"#111", border:"1px solid #1f1f1f", borderRadius:"8px", padding:"28px 24px"}}>
        <div style={{fontSize:"20px", fontWeight:"900", color:"#fff", letterSpacing:"1px"}}>PLAN DEFINITIVO</div>
        <div style={{fontSize:"12px", color:"#6b7280", marginBottom:"22px"}}>Inicia sesión para ver tu plan</div>
        <input type="email" required autoFocus placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} style={authInputStyle}/>
        <input type="password" required placeholder="Contraseña" value={password} onChange={e=>setPassword(e.target.value)} style={authInputStyle}/>
        {error && <div style={{color:"#ef4444", fontSize:"12px", marginBottom:"10px", lineHeight:"1.5"}}>{error}</div>}
        <button type="submit" disabled={loading} style={{width:"100%", padding:"12px", background:loading?"#0a1a15":"#00d4aa20", border:"1px solid #00d4aa60", color:"#00d4aa", borderRadius:"5px", cursor:loading?"default":"pointer", fontFamily:"inherit", fontWeight:"700", fontSize:"13px"}}>
          {loading ? "Entrando…" : "Entrar"}
        </button>
      </form>
    </div>
  );
}

const UnknownAccountScreen = ({ email }) => (
  <div style={{minHeight:"100vh", display:"flex", alignItems:"center", justifyContent:"center", background:"#090909", padding:"20px"}}>
    <div style={{width:"100%", maxWidth:"360px", background:"#111", border:"1px solid #1f1f1f", borderRadius:"8px", padding:"28px 24px", textAlign:"center"}}>
      <div style={{fontSize:"28px", marginBottom:"10px"}}>🔒</div>
      <div style={{fontSize:"16px", fontWeight:"900", color:"#fff", marginBottom:"8px"}}>Cuenta no configurada</div>
      <div style={{fontSize:"12px", color:"#9ca3af", lineHeight:"1.6", marginBottom:"16px"}}>La cuenta <strong style={{color:"#e5e7eb"}}>{email}</strong> existe en Supabase pero no tiene un plan asignado en la app. Contacta al administrador para que la añada.</div>
      <button onClick={()=>sb.auth.signOut()} style={{padding:"10px 16px", background:"transparent", border:"1px solid #262626", color:"#6b7280", borderRadius:"5px", cursor:"pointer", fontFamily:"inherit", fontSize:"12px"}}>Cerrar sesión</button>
    </div>
  </div>
);

const resolveProfileKey = (email) => PROFILE_KEY_BY_EMAIL[(email || "").trim().toLowerCase()];

const AuthGate = () => {
  const [session, setSession] = useState(undefined); // undefined=cargando · null=sin sesión · objeto=logueado

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: listener } = sb.auth.onAuthStateChange((_event, newSession) => setSession(newSession));
    return () => listener.subscription.unsubscribe();
  }, []);

  if (session === undefined) return <SplashLoading/>;
  if (!session) return <LoginScreen/>;

  const profileKey = resolveProfileKey(session.user.email);
  const bundle = PROFILES[profileKey];
  if (!bundle) return <UnknownAccountScreen email={session.user.email}/>;

  return (
    <ProfileBundleContext.Provider value={bundle}>
      <App session={session}/>
    </ProfileBundleContext.Provider>
  );
}

const App = ({ session }) => {
  const { phases, dd, nutricionTips, tests2, copy } = useProfileBundle();
  const [activePhase, setActivePhase] = useState(1);
  const [activeDay, setActiveDay] = useState(0);
  const [tab, setTab] = useState("inicio");

  const phase = phases[activePhase-1];
  const phaseKey = getKey(activePhase);
  const dayName = DAYS[activeDay];
  const day = dd[phaseKey][dayName];
  const col = phase.color;

  return (
    <div className="app-inner" style={{minHeight:"100vh",background:"#090909",color:"#e5e7eb",fontFamily:"'Barlow Condensed','Arial Narrow',Arial,sans-serif"}}>
      <div style={{background:"#111",borderBottom:`2px solid ${col}30`,padding:"16px 20px 12px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,right:0,width:"140px",height:"100%",background:`linear-gradient(135deg,transparent 40%,${col}10 100%)`}}/>
        <button onClick={()=>sb.auth.signOut()} style={{position:"absolute",top:"14px",right:"14px",padding:"5px 10px",background:"transparent",border:"1px solid #262626",color:"#6b7280",borderRadius:"4px",cursor:"pointer",fontFamily:"inherit",fontSize:"9px",letterSpacing:"1px",textTransform:"uppercase",zIndex:1}}>Cerrar sesión</button>
        <div style={{fontSize:"var(--fs-10)",letterSpacing:"4px",color:"#4b5563",textTransform:"uppercase"}}>{copy.headerEyebrow}</div>
        <div style={{fontSize:"var(--fs-26)",fontWeight:"900",letterSpacing:"2px",color:"#fff",marginTop:"2px"}}>PLAN DEFINITIVO</div>
        <div style={{fontSize:"var(--fs-12)",color:"#6b7280",marginTop:"2px"}}>{copy.headerSubtitle}</div>
      </div>

      <div style={{display:"flex",background:"#0d0d0d",borderBottom:"1px solid #1a1a1a",overflowX:"auto",scrollbarWidth:"none"}}>
        {[["inicio","🏠 Inicio"],["plan","📋 Plan"],["horario","🗓️ Horario"],["progresion","📈 Progresión"],["objetivos","🎯 Objetivos"],["nutricion","🥗 Nutrición"],["extras","💊 Extras"],["test","📊 Tests"],["deploy","🌐 Publicar"]].map(([id,label])=>(
          <button key={id} className="tab-btn" onClick={()=>setTab(id)} style={{flexShrink:0,padding:"10px 10px",background:"transparent",border:"none",borderBottom:tab===id?`2px solid ${col}`:"2px solid transparent",color:tab===id?col:"#6b7280",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",fontSize:"var(--fs-10)",letterSpacing:"0.5px",whiteSpace:"nowrap"}}>{label}</button>
        ))}
      </div>

      {tab==="inicio"&&<InicioTab col={col} phase={phase} setTab={setTab}/>}

      {tab==="horario"&&<HorarioTab col={col} phaseKey={phaseKey}/>}

      {tab==="progresion"&&<ProgresionTab col={col}/>}

      {tab==="objetivos"&&<ObjetivosTab col={col}/>}

      {tab==="nutricion"&&(
        <div style={{padding:"14px"}}>
          <div style={{fontSize:"var(--fs-9)",letterSpacing:"3px",color:"#4b5563",textTransform:"uppercase",marginBottom:"10px"}}>{copy.nutricionSectionTitle}</div>
          <div style={{fontSize:"var(--fs-11)",color:"#9ca3af",marginBottom:"12px",lineHeight:"1.65",padding:"10px 12px",background:"#111",borderRadius:"4px",borderLeft:`3px solid ${col}`}}>
            {copy.nutricionIntro}
          </div>
          <div className="grid2">
          {nutricionTips.map((t,i)=>(
            <div key={i} style={{background:"#111",border:"1px solid #1f1f1f",borderRadius:"6px",padding:"12px",marginBottom:"6px"}}>
              <div style={{fontSize:"var(--fs-14)",marginBottom:"4px"}}>{t.icon} <span style={{fontSize:"var(--fs-13)",fontWeight:"700",color:"#f3f4f6"}}>{t.title}</span></div>
              <div style={{fontSize:"var(--fs-11)",color:"#9ca3af",lineHeight:"1.6"}}>{t.text}</div>
            </div>
          ))}
          </div>
        </div>
      )}

      {tab==="test"&&(
        <div style={{padding:"14px"}}>
          <div style={{fontSize:"var(--fs-9)",letterSpacing:"3px",color:"#4b5563",textTransform:"uppercase",marginBottom:"10px"}}>TESTS DE PROGRESO</div>
          <div className="grid2">
          {tests2.map((t,i)=>(
            <div key={i} style={{background:"#111",border:"1px solid #1f1f1f",borderRadius:"6px",padding:"12px",marginBottom:"6px",display:"flex",gap:"10px",alignItems:"flex-start"}}>
              <div style={{background:`${col}20`,color:col,padding:"3px 8px",borderRadius:"3px",fontSize:"var(--fs-9)",fontWeight:"700",letterSpacing:"1px",flexShrink:0,whiteSpace:"nowrap"}}>{t.semana}</div>
              <div>
                <div style={{fontSize:"var(--fs-12)",fontWeight:"700",color:"#f3f4f6"}}>{t.test}</div>
                <div style={{fontSize:"var(--fs-10)",color:col,marginTop:"3px"}}>→ {t.objetivo}</div>
              </div>
            </div>
          ))}
          </div>
          <div style={{marginTop:"10px",padding:"10px 12px",background:"#0a0a0a",borderRadius:"4px",border:"1px solid #141414",fontSize:"var(--fs-10)",color:"#4b5563"}}>
            💡 Mídete la cintura cada 4 semanas. Es el indicador más honesto de pérdida de grasa abdominal.
          </div>
        </div>
      )}

      {tab==="extras"&&<ExtrasTab col={col}/>}

      {tab==="deploy"&&<DeployGuide col={col}/>}

      {tab==="plan"&&(
        <>
          <div style={{display:"flex",borderBottom:"1px solid #1a1a1a",overflowX:"auto",scrollbarWidth:"none"}}>
            {phases.map(p=>(
              <button key={p.id} className="phase-btn" onClick={()=>{setActivePhase(p.id);setActiveDay(0);}} style={{flexShrink:0,padding:"10px 14px",background:activePhase===p.id?"#141414":"transparent",border:"none",borderBottom:activePhase===p.id?`2px solid ${p.color}`:"2px solid transparent",color:activePhase===p.id?p.color:"#6b7280",cursor:"pointer",fontFamily:"inherit",fontWeight:"900",fontSize:"var(--fs-10)",letterSpacing:"1.5px",textTransform:"uppercase"}}>
                <div>{p.name}</div>
                <div style={{fontSize:"var(--fs-8)",fontWeight:"400",opacity:0.7}}>{p.weeks}</div>
              </button>
            ))}
          </div>
          <div style={{padding:"10px 18px",background:"#0c0c0c",borderBottom:"1px solid #141414",fontSize:"var(--fs-11)",color:"#9ca3af",borderLeft:`3px solid ${col}`}}>{phase.desc}</div>
          <div style={{display:"flex",background:"#0d0d0d",borderBottom:"1px solid #141414",overflowX:"auto",scrollbarWidth:"none"}}>
            {DAYS.map((d,i)=>(
              <button key={d} className="day-btn" onClick={()=>setActiveDay(i)} style={{flexShrink:0,padding:"8px 12px",background:activeDay===i?"#141414":"transparent",border:"none",borderBottom:activeDay===i?`2px solid ${col}`:"2px solid transparent",color:activeDay===i?col:"#6b7280",cursor:"pointer",fontFamily:"inherit",fontWeight:activeDay===i?"900":"400",fontSize:"var(--fs-10)",letterSpacing:"1px",textTransform:"uppercase"}}>
                {DAY_EMOJI[d]} {DAYS_S[i]}
              </button>
            ))}
          </div>
          <div style={{padding:"14px 14px 60px"}}>
            <div style={{background:"#111",border:"1px solid #1a1a1a",borderTop:`3px solid ${col}`,borderRadius:"6px",padding:"14px",marginBottom:"12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}}>
                <div>
                  <div style={{fontSize:"var(--fs-9)",color:"#4b5563",letterSpacing:"3px",textTransform:"uppercase"}}>{dayName} · {phase.name} · {day.tipo}</div>
                  <div style={{fontSize:"var(--fs-18)",fontWeight:"900",color:"#fff",letterSpacing:"1px",marginTop:"3px"}}>{day.title}</div>
                </div>
                <div style={{background:`${col}20`,border:`1px solid ${col}40`,color:col,padding:"5px 10px",borderRadius:"4px",fontSize:"var(--fs-11)",fontWeight:"700",flexShrink:0}}>⏱ {day.duration}</div>
              </div>
              {day.warmup&&day.warmup!=="—"&&(
                <div style={{marginTop:"10px",padding:"7px 10px",background:"#0a0a0a",borderRadius:"3px",fontSize:"var(--fs-11)",color:"#9ca3af",borderLeft:"2px solid #222"}}>
                  <span style={{color:"#4b5563",textTransform:"uppercase",fontSize:"var(--fs-9)"}}>Calentamiento: </span>{day.warmup}
                </div>
              )}
            </div>
            <div style={{padding:"8px 12px",background:"#080f08",border:"1px solid #14532430",borderRadius:"4px",marginBottom:"12px",fontSize:"var(--fs-10)",color:"#86efac",display:"flex",alignItems:"center",gap:"8px"}}>
              <span>🤖</span><span>Pulsa cualquier ejercicio → <strong>Tutorial IA</strong> para instrucciones paso a paso · <strong>▶️ Ver Vídeo</strong> para ver cómo se hace</span>
            </div>
            {day.exercises.map((ex,i)=>(
              <ExCard key={`${activePhase}-${activeDay}-${i}`} ex={ex} i={i} col={col}/>
            ))}
            {day.cooldown&&day.cooldown!=="—"&&<div style={{background:"#0d0d0d",border:"1px solid #1a1a1a",borderRadius:"4px",padding:"9px 12px",marginBottom:"6px",fontSize:"var(--fs-11)",color:"#9ca3af",borderLeft:"2px solid #222",marginTop:"6px"}}><span style={{color:"#4b5563",fontSize:"var(--fs-9)",textTransform:"uppercase"}}>Enfriamiento: </span>{day.cooldown}</div>}
            {day.hip_note&&<div style={{background:"#080e1a",border:"1px solid #1d3a6a35",borderRadius:"4px",padding:"9px 12px",marginBottom:"6px",fontSize:"var(--fs-11)",color:"#93c5fd"}}>{day.hip_note}</div>}

            {day.nutrition&&<div style={{background:"#080f08",border:"1px solid #14532430",borderRadius:"4px",padding:"9px 12px",marginBottom:"6px",fontSize:"var(--fs-11)",color:"#86efac"}}>{day.nutrition}</div>}

}

ReactDOM.createRoot(document.getElementById("root")).render(<AuthGate/>);

</script>
