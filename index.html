/* ── Escala tipográfica: los estilos inline usan var(--fs-N).
   En móvil valen N px; en tablet (≥700px) la escala entera sube. ── */
:root{
  color-scheme:dark;
  --fs-8:8px;--fs-9:9px;--fs-10:10px;--fs-11:11px;--fs-12:12px;
  --fs-13:13px;--fs-14:14px;--fs-18:18px;--fs-26:26px;
}
@media(min-width:700px){
  :root{
    --fs-8:10px;--fs-9:11px;--fs-10:12px;--fs-11:13px;--fs-12:14px;
    --fs-13:15px;--fs-14:17px;--fs-18:23px;--fs-26:36px;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:#090909;color:#e5e7eb;font-family:'Barlow Condensed','Arial Narrow',Arial,sans-serif;-webkit-font-smoothing:antialiased;touch-action:manipulation}
::-webkit-scrollbar{height:4px;width:4px}
::-webkit-scrollbar-track{background:#111}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
a{text-decoration:none}
button,a{-webkit-tap-highlight-color:transparent}
button:hover,a:hover{filter:brightness(1.35)}
button:focus-visible,a:focus-visible{outline:2px solid #00d4aa;outline-offset:-2px}
h1,h2,h3{text-wrap:balance}

/* ── Contenedor: en tablet la app se centra con ancho máximo
   en vez de estirarse de borde a borde ── */
@media(min-width:700px){
  .app-inner{max-width:900px;margin:0 auto;border-left:1px solid #1a1a1a;border-right:1px solid #1a1a1a}
  .tab-btn{padding:14px 4px !important;letter-spacing:1.5px !important}
  .day-btn{flex:1;padding:12px 14px !important}
  .phase-btn{flex:1;padding:12px 16px !important}
}

/* ── Rejilla de tarjetas: 1 columna en móvil, 2 en tablet ── */
.grid2{display:block}
@media(min-width:700px){
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:start}
  .grid2>*{margin-bottom:0 !important;height:100%}
}

@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.25s ease}
iframe{border:none}
</style>

// ─── PERSISTENCIA LOCAL ────────────────────────────────────────────────────────
// Un único hook para leer/escribir en localStorage. Todo lo que Fernando registra
// (peso, dolor, fotos, racha) vive en el navegador — no hay backend ni servidor.
// En GitHub Pages (https) persiste sin problema. Abierto con doble clic (file://)
// algunos navegadores lo bloquean: por eso el aviso en la pestaña Objetivos.
const usePersistentState = (key, initialValue) => {
  const [state, setState] = useState(() => {
    try {
      const raw = localStorage.getItem(key);
      return raw !== null ? JSON.parse(raw) : initialValue;
    } catch { return initialValue; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(state)); } catch {}
  }, [key, state]);
  return [state, setState];
};

      try {

const compressImage = (file) => new Promise((resolve, reject) => {
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, 400 / img.width);
      const canvas = document.createElement("canvas");
      canvas.width = img.width * scale;
      canvas.height = img.height * scale;
      canvas.getContext("2d").drawImage(img, 0, 0, canvas.width, canvas.height);
      resolve(canvas.toDataURL("image/jpeg", 0.6));
    };
    img.onerror = reject;
    img.src = e.target.result;
  };
  reader.onerror = reject;
  reader.readAsDataURL(file);
});

function MiniChart({ data, col }) {
  if (data.length < 2) return <div style={{fontSize:"var(--fs-10)",color:"#4b5563",padding:"14px",textAlign:"center"}}>Añade al menos 2 registros para ver la gráfica</div>;
  const values = data.map(d => d.value);
  const min = Math.min(...values), max = Math.max(...values), range = (max - min) || 1;
  const w = 100, h = 36, pad = 4;
  const coords = data.map((d,i) => ({
    x: pad + (i/(data.length-1)) * (w-2*pad),
    y: pad + (1 - (d.value-min)/range) * (h-2*pad),
  }));
  return (
    <svg viewBox={`0 0 ${w} ${h}`} style={{width:"100%",height:"70px",display:"block"}} preserveAspectRatio="none">
      <polyline points={coords.map(c=>`${c.x},${c.y}`).join(" ")} fill="none" stroke={col} strokeWidth="1.5" vectorEffect="non-scaling-stroke"/>
      {coords.map((c,i)=><circle key={i} cx={c.x} cy={c.y} r="1.6" fill={col}/>)}
    </svg>
  );
}

const painRecommendation = (entry) => {
  if (!entry) return null;
  if (entry.post >= 7) return { color:"#ef4444", text:"Dolor alto tras entrenar. Para la actividad que lo causó, hielo 15–20 min, y si se repite dos sesiones seguidas coméntalo antes de la consulta del 28 de diciembre." };
  if (entry.post - entry.pre >= 3) return { color:"#f59e0b", text:"El entreno empeoró la cadera claramente. Revisa qué ejercicio lo causó y reduce carga o rango la próxima vez." };
  if (entry.post >= 4) return { color:"#f59e0b", text:"Molestia moderada. Reduce volumen la próxima sesión y prioriza los ejercicios de blindaje de cadera." };
  return { color:"#4ade80", text:"Buena señal. Puedes mantener o progresar ligeramente la próxima sesión." };
};

const computeStreak = (trainedDays) => {
  const set = new Set(trainedDays);
  let streak = 0;
  const cursor = new Date();
  while (set.has(cursor.toISOString().slice(0,10))) {
    streak++;
    cursor.setDate(cursor.getDate() - 1);
  }
  return streak;
};

      </div>
      <div style={{display:"flex",gap:"6px",marginTop:"10px"}}>
        <button onClick={()=>setTab("plan")} style={{flex:1,padding:"9px",background:"#111",border:"1px solid #1f1f1f",color:"#9ca3af",borderRadius:"4px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",fontSize:"var(--fs-10)"}}>📋 Ir al Plan</button>
        <button onClick={()=>setTab("horario")} style={{flex:1,padding:"9px",background:"#111",border:"1px solid #1f1f1f",color:"#9ca3af",borderRadius:"4px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",fontSize:"var(--fs-10)"}}>🗓️ Ir al Horario</button>
        <button onClick={()=>setTab("objetivos")} style={{flex:1,padding:"9px",background:"#111",border:"1px solid #1f1f1f",color:"#9ca3af",borderRadius:"4px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",fontSize:"var(--fs-10)"}}>🎯 Ir a Objetivos</button>
      </div>
    </div>
  );
}

function App() {
  const [activePhase, setActivePhase] = useState(1);
  const [activeDay, setActiveDay] = useState(0);
  const [tab, setTab] = useState("inicio");

  const phase = phases[activePhase-1];
  const phaseKey = getKey(activePhase);
  const dayName = DAYS[activeDay];
  const day = dd[phaseKey][dayName];
  const col = phase.color;

  return (
    <div className="app-inner" style={{minHeight:"100vh",background:"#090909",color:"#e5e7eb",fontFamily:"'Barlow Condensed','Arial Narrow',Arial,sans-serif"}}>
      <div style={{background:"#111",borderBottom:`2px solid ${col}30`,padding:"16px 20px 12px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:0,right:0,width:"140px",height:"100%",background:`linear-gradient(135deg,transparent 40%,${col}10 100%)`}}/>
        <div style={{fontSize:"var(--fs-10)",letterSpacing:"4px",color:"#4b5563",textTransform:"uppercase"}}>Fernando #CalvoMalvado · Enduro MTB + Calistenia</div>
        <div style={{fontSize:"var(--fs-26)",fontWeight:"900",letterSpacing:"2px",color:"#fff",marginTop:"2px"}}>PLAN DEFINITIVO</div>
        <div style={{fontSize:"var(--fs-12)",color:"#6b7280",marginTop:"2px"}}>1,78m · 86kg · 24 semanas · Masa muscular + pérdida de grasa · Cadera protegida · Preparación enduro</div>
      </div>

      <div style={{display:"flex",background:"#0d0d0d",borderBottom:"1px solid #1a1a1a",overflowX:"auto",scrollbarWidth:"none"}}>
        {[["inicio","🏠 Inicio"],["plan","📋 Plan"],["horario","🗓️ Horario"],["progresion","📈 Progresión"],["objetivos","🎯 Objetivos"],["nutricion","🥗 Nutrición"],["extras","💊 Extras"],["test","📊 Tests"],["deploy","🌐 Publicar"]].map(([id,label])=>(
          <button key={id} className="tab-btn" onClick={()=>setTab(id)} style={{flexShrink:0,padding:"10px 10px",background:"transparent",border:"none",borderBottom:tab===id?`2px solid ${col}`:"2px solid transparent",color:tab===id?col:"#6b7280",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",fontSize:"var(--fs-10)",letterSpacing:"0.5px",whiteSpace:"nowrap"}}>{label}</button>
        ))}
      </div>

      {tab==="inicio"&&<InicioTab col={col} phase={phase} setTab={setTab}/>}

      {tab==="horario"&&<HorarioTab col={col} phaseKey={phaseKey}/>}

      {tab==="progresion"&&<ProgresionTab col={col}/>}

      {tab==="objetivos"&&<ObjetivosTab col={col}/>}

      {tab==="nutricion"&&(
        <div style={{padding:"14px"}}>
          <div style={{fontSize:"var(--fs-9)",letterSpacing:"3px",color:"#4b5563",textTransform:"uppercase",marginBottom:"10px"}}>NUTRICIÓN PARA RECOMPOSICIÓN</div>
          <div style={{fontSize:"var(--fs-11)",color:"#9ca3af",marginBottom:"12px",lineHeight:"1.65",padding:"10px 12px",background:"#111",borderRadius:"4px",borderLeft:`3px solid ${col}`}}>
            Recomposición = perder grasa + ganar músculo a la vez. Clave: déficit calórico controlado, proteína alta, fuerza pesada y carbohidratos bien colocados para rendir en enduro.
          </div>
          <div className="grid2">
          {nutricionTips.map((t,i)=>(
            <div key={i} style={{background:"#111",border:"1px solid #1f1f1f",borderRadius:"6px",padding:"12px",marginBottom:"6px"}}>
              <div style={{fontSize:"var(--fs-14)",marginBottom:"4px"}}>{t.icon} <span style={{fontSize:"var(--fs-13)",fontWeight:"700",color:"#f3f4f6"}}>{t.title}</span></div>
              <div style={{fontSize:"var(--fs-11)",color:"#9ca3af",lineHeight:"1.6"}}>{t.text}</div>
            </div>
          ))}
          </div>
        </div>
      )}

      {tab==="test"&&(
        <div style={{padding:"14px"}}>
          <div style={{fontSize:"var(--fs-9)",letterSpacing:"3px",color:"#4b5563",textTransform:"uppercase",marginBottom:"10px"}}>TESTS DE PROGRESO</div>
          <div className="grid2">
          {tests2.map((t,i)=>(
            <div key={i} style={{background:"#111",border:"1px solid #1f1f1f",borderRadius:"6px",padding:"12px",marginBottom:"6px",display:"flex",gap:"10px",alignItems:"flex-start"}}>
              <div style={{background:`${col}20`,color:col,padding:"3px 8px",borderRadius:"3px",fontSize:"var(--fs-9)",fontWeight:"700",letterSpacing:"1px",flexShrink:0,whiteSpace:"nowrap"}}>{t.semana}</div>
              <div>
                <div style={{fontSize:"var(--fs-12)",fontWeight:"700",color:"#f3f4f6"}}>{t.test}</div>
                <div style={{fontSize:"var(--fs-10)",color:col,marginTop:"3px"}}>→ {t.objetivo}</div>
              </div>
            </div>
          ))}
          </div>
          <div style={{marginTop:"10px",padding:"10px 12px",background:"#0a0a0a",borderRadius:"4px",border:"1px solid #141414",fontSize:"var(--fs-10)",color:"#4b5563"}}>
            💡 Mídete la cintura cada 4 semanas. Es el indicador más honesto de pérdida de grasa abdominal.
          </div>
        </div>
      )}

      {tab==="extras"&&<ExtrasTab col={col}/>}

      {tab==="deploy"&&<DeployGuide col={col}/>}

      {tab==="plan"&&(
        <>
          <div style={{display:"flex",borderBottom:"1px solid #1a1a1a",overflowX:"auto",scrollbarWidth:"none"}}>
            {phases.map(p=>(
              <button key={p.id} className="phase-btn" onClick={()=>{setActivePhase(p.id);setActiveDay(0);}} style={{flexShrink:0,padding:"10px 14px",background:activePhase===p.id?"#141414":"transparent",border:"none",borderBottom:activePhase===p.id?`2px solid ${p.color}`:"2px solid transparent",color:activePhase===p.id?p.color:"#6b7280",cursor:"pointer",fontFamily:"inherit",fontWeight:"900",fontSize:"var(--fs-10)",letterSpacing:"1.5px",textTransform:"uppercase"}}>
                <div>{p.name}</div>
                <div style={{fontSize:"var(--fs-8)",fontWeight:"400",opacity:0.7}}>{p.weeks}</div>
              </button>
            ))}
          </div>
          <div style={{padding:"10px 18px",background:"#0c0c0c",borderBottom:"1px solid #141414",fontSize:"var(--fs-11)",color:"#9ca3af",borderLeft:`3px solid ${col}`}}>{phase.desc}</div>
          <div style={{display:"flex",background:"#0d0d0d",borderBottom:"1px solid #141414",overflowX:"auto",scrollbarWidth:"none"}}>
            {DAYS.map((d,i)=>(
              <button key={d} className="day-btn" onClick={()=>setActiveDay(i)} style={{flexShrink:0,padding:"8px 12px",background:activeDay===i?"#141414":"transparent",border:"none",borderBottom:activeDay===i?`2px solid ${col}`:"2px solid transparent",color:activeDay===i?col:"#6b7280",cursor:"pointer",fontFamily:"inherit",fontWeight:activeDay===i?"900":"400",fontSize:"var(--fs-10)",letterSpacing:"1px",textTransform:"uppercase"}}>
                {DAY_EMOJI[d]} {DAYS_S[i]}
              </button>
            ))}
          </div>
          <div style={{padding:"14px 14px 60px"}}>
            <div style={{background:"#111",border:"1px solid #1a1a1a",borderTop:`3px solid ${col}`,borderRadius:"6px",padding:"14px",marginBottom:"12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:"8px"}}>
                <div>
                  <div style={{fontSize:"var(--fs-9)",color:"#4b5563",letterSpacing:"3px",textTransform:"uppercase"}}>{dayName} · {phase.name} · {day.tipo}</div>
                  <div style={{fontSize:"var(--fs-18)",fontWeight:"900",color:"#fff",letterSpacing:"1px",marginTop:"3px"}}>{day.title}</div>
                </div>
                <div style={{background:`${col}20`,border:`1px solid ${col}40`,color:col,padding:"5px 10px",borderRadius:"4px",fontSize:"var(--fs-11)",fontWeight:"700",flexShrink:0}}>⏱ {day.duration}</div>
              </div>
              {day.warmup&&day.warmup!=="—"&&(
                <div style={{marginTop:"10px",padding:"7px 10px",background:"#0a0a0a",borderRadius:"3px",fontSize:"var(--fs-11)",color:"#9ca3af",borderLeft:"2px solid #222"}}>
                  <span style={{color:"#4b5563",textTransform:"uppercase",fontSize:"var(--fs-9)"}}>Calentamiento: </span>{day.warmup}
                </div>
              )}
            </div>
            <div style={{padding:"8px 12px",background:"#080f08",border:"1px solid #14532430",borderRadius:"4px",marginBottom:"12px",fontSize:"var(--fs-10)",color:"#86efac",display:"flex",alignItems:"center",gap:"8px"}}>
              <span>🤖</span><span>Pulsa cualquier ejercicio → <strong>Tutorial IA</strong> para instrucciones paso a paso · <strong>▶️ Ver Vídeo</strong> para ver cómo se hace</span>
            </div>
            {day.exercises.map((ex,i)=>(
              <ExCard key={`${activePhase}-${activeDay}-${i}`} ex={ex} i={i} col={col}/>
            ))}
            {day.cooldown&&day.cooldown!=="—"&&<div style={{background:"#0d0d0d",border:"1px solid #1a1a1a",borderRadius:"4px",padding:"9px 12px",marginBottom:"6px",fontSize:"var(--fs-11)",color:"#9ca3af",borderLeft:"2px solid #222",marginTop:"6px"}}><span style={{color:"#4b5563",fontSize:"var(--fs-9)",textTransform:"uppercase"}}>Enfriamiento: </span>{day.cooldown}</div>}
            {day.hip_note&&<div style={{background:"#080e1a",border:"1px solid #1d3a6a35",borderRadius:"4px",padding:"9px 12px",marginBottom:"6px",fontSize:"var(--fs-11)",color:"#93c5fd"}}>{day.hip_note}</div>}
            {day.music&&<div style={{background:"#0c0a18",border:"1px solid #6d28d930",borderRadius:"4px",padding:"9px 12px",marginBottom:"6px",fontSize:"var(--fs-11)",color:"#c4b5fd"}}>{day.music}</div>}
            {day.nutrition&&<div style={{background:"#080f08",border:"1px solid #14532430",borderRadius:"4px",padding:"9px 12px",marginBottom:"6px",fontSize:"var(--fs-11)",color:"#86efac"}}>{day.nutrition}</div>}
            <div style={{marginTop:"10px",padding:"10px 12px",background:"#080808",borderRadius:"4px",border:"1px solid #111",fontSize:"var(--fs-10)",color:"#374151"}}>
              <div style={{color:"#1f2937",textTransform:"uppercase",letterSpacing:"2px",fontSize:"var(--fs-9)",marginBottom:"4px"}}>PROGRESIÓN {phase.name}</div>
              {activePhase===1&&"Sem 1–2: aprende técnica, no el peso. Sem 3: añade 1 serie. Sem 4: sube peso donde llegues a 15 reps fácil."}
              {activePhase===2&&"Sem 5–6: volumen máximo. Sem 7: añade peso en paralelas y dominadas. Sem 8: test de máximas reps."}
              {activePhase===3&&"Sem 9–10: pesos máximos. Sem 11: muscle-up o negativas explosivas. Sem 12: test total del plan."}
              {activePhase===4&&"Sem 13–14: fuerza pesada y zona 2 larga. Sem 15: sube una serie en básicos. Sem 16: mide cintura, peso medio y rendimiento."}
              {activePhase===5&&"Sem 17–18: subidas y sprints controlados. Sem 19: salida o simulación larga. Sem 20: test de 90 min y ajuste de calorías."}
              {activePhase===6&&"Sem 21–22: afina sin acumular fatiga. Sem 23: reduce volumen un 20%. Sem 24: test final enduro, fotos, cintura y nuevo objetivo."}
            </div>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);

</script>
</body>
</html>
