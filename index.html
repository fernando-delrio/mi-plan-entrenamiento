function ExCard({ex, i, col}) {
  const [open, setOpen] = useState(false);
  const [panel, setPanel] = useState(null);
  const [aiData, setAiData] = useState(null);
  const [loading, setLoading] = useState(false);

  async function handleAI() {
    setPanel(panel === "ai" ? null : "ai");
    if (!aiData && !loading) {
      setLoading(true);
      try {
        const prompt = `Eres un coach de calistenia y enduro MTB profesional. Fernando tiene 38 años, 1,79m, 86kg, artrosis con choque femoroacetabular en cadera derecha (dolor crónico). Explícale el ejercicio "${ex.name}" en español de forma directa.\n\nResponde SOLO con JSON válido (sin markdown):\n{"como_hacerlo":["paso 1","paso 2","paso 3","paso 4"],"errores_comunes":["error 1","error 2","error 3"],"cue_activacion":"frase corta para sentir el músculo","cadera":"nota sobre la cadera de Fernando","nivel_dificultad":"Principiante / Intermedio / Avanzado"}`;
        const res = await fetch("https://api.anthropic.com/v1/messages", {
          method:"POST", headers:{"Content-Type":"application/json"},
          body:JSON.stringify({model:"claude-sonnet-4-6",max_tokens:800,messages:[{role:"user",content:prompt}]})
        });
        const data = await res.json();
        const text = data.content?.find(b=>b.type==="text")?.text||"{}";
        setAiData(JSON.parse(text.replace(/```json|```/g,"").trim()));
      } catch(e) { setAiData(null); }
      setLoading(false);
    }
  }

  return (
    <div style={{background:"#111",border:`1px solid ${open?col+"45":"#1f1f1f"}`,borderRadius:"6px",overflow:"hidden",marginBottom:"6px",transition:"border-color 0.2s"}}>
      <div onClick={()=>setOpen(!open)} style={{padding:"11px 12px",display:"flex",gap:"10px",alignItems:"flex-start",cursor:"pointer"}}>
        <div style={{background:`${col}25`,color:col,width:"26px",height:"26px",borderRadius:"4px",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",fontWeight:"900",flexShrink:0}}>{i+1}</div>
        <div style={{flex:1}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
            <div style={{fontSize:"13px",fontWeight:"700",color:"#f3f4f6",flex:1,lineHeight:"1.3"}}>{ex.name}</div>
            <span style={{color:col,fontSize:"13px",marginLeft:"8px",flexShrink:0}}>{open?"▲":"▼"}</span>
          </div>
          <div style={{display:"flex",gap:"8px",marginTop:"5px",flexWrap:"wrap"}}>
            {ex.sets!=="—"&&<span style={{fontSize:"10px",color:col,fontWeight:"700",letterSpacing:"1px"}}>{ex.sets} series</span>}
            {ex.reps!=="—"&&<span style={{fontSize:"10px",color:"#e5e7eb",letterSpacing:"1px"}}>{ex.reps} reps</span>}
            {ex.rest!=="—"&&<span style={{fontSize:"10px",color:"#6b7280",letterSpacing:"1px"}}>💤 {ex.rest}</span>}
          </div>
          {ex.note&&<div style={{fontSize:"10px",color:"#6b7280",marginTop:"3px",fontStyle:"italic"}}>→ {ex.note}</div>}
        </div>
      </div>
      {open&&(
        <div style={{borderTop:`1px solid ${col}20`,padding:"12px 12px 12px 48px"}}>
          {ex.muscles&&<div style={{display:"inline-block",background:`${col}15`,border:`1px solid ${col}30`,color:col,padding:"3px 8px",borderRadius:"3px",fontSize:"9px",letterSpacing:"1px",textTransform:"uppercase",fontWeight:"700",marginBottom:"10px"}}>💪 {ex.muscles}</div>}
          <div style={{display:"flex",gap:"6px",marginBottom:"10px"}}>
            <button onClick={handleAI} style={{flex:1,padding:"9px 8px",background:panel==="ai"?`${col}25`:`${col}12`,border:`1px solid ${col}${panel==="ai"?"80":"40"}`,color:col,borderRadius:"4px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",fontSize:"11px",letterSpacing:"1px"}}>
              🤖 Tutorial IA
            </button>
            <button onClick={()=>setPanel(panel==="video"?null:"video")} style={{flex:1,padding:"9px 8px",background:panel==="video"?"#1a0505":"transparent",border:`1px solid ${panel==="video"?"#ef4444":"#3a1010"}`,color:"#ef4444",borderRadius:"4px",cursor:"pointer",fontFamily:"inherit",fontWeight:"700",fontSize:"11px",letterSpacing:"1px"}}>
              ▶️ Ver Vídeo
            </button>
          </div>
          {panel==="ai"&&(
            <div style={{background:"#0a0a0a",border:`1px solid ${col}25`,borderRadius:"4px",padding:"12px",marginBottom:"8px"}}>
              {loading&&<div style={{display:"flex",alignItems:"center",gap:"8px",color:"#6b7280",fontSize:"11px",padding:"8px 0"}}><div style={{width:"14px",height:"14px",border:`2px solid ${col}`,borderTopColor:"transparent",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/>Generando tutorial personalizado...</div>}
              {!loading&&aiData&&(
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>

                🔗 Abrir búsqueda completa en YouTube →
              </a>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

  const day = dd[phaseKey][dayName];
  const col = phase.color;

  return (
    <div style={{minHeight:"100vh",background:"#090909",color:"#e5e7eb",fontFamily:"'Barlow Condensed','Arial Narrow',Arial,sans-serif"}}>

      {tab==="nutricion"&&(
        <div style={{padding:"14px"}}>
          <div style={{fontSize:"9px",letterSpacing:"3px",color:"#4b5563",textTransform:"uppercase",marginBottom:"10px"}}>NUTRICIÓN PARA RECOMPOSICIÓN</div>

            {day.music&&<div style={{background:"#0c0a18",border:"1px solid #6d28d930",borderRadius:"4px",padding:"9px 12px",marginBottom:"6px",fontSize:"11px",color:"#c4b5fd"}}>{day.music}</div>}
